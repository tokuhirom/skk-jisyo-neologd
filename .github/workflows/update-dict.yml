name: release-dict

on:
  workflow_dispatch:
    inputs:
      neologd_version:
        description: 'mecab-ipadic-neologd seed version (e.g. 20200910)'
        required: true
        default: '20200910'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install deps
      run: sudo apt-get install -y skktools cpanminus

    - name: Install cpan modules
      run: sudo cpanm -nv Lingua::JA::Regular::Unicode

    - name: Build dictionary
      run: perl download.pl ${{ inputs.neologd_version }}

    - name: Commit dictionary
      run: |
        git config --global user.email "tokuhirom@gmail.com"
        git config --global user.name "tokuhirom by github actions"
        git add SKK-JISYO.neologd
        git diff --cached --quiet || (git commit -m 'Update dictionary' && git push origin master)

    - name: Create release
      env:
        GH_TOKEN: ${{ github.token }}
        NEOLOGD_VERSION: ${{ inputs.neologd_version }}
      run: |
        # Find next suffix: 20200910-a, 20200910-b, ...
        LATEST=$(gh release list --limit 100 --json tagName --jq "[.[] | select(.tagName | startswith(\"${NEOLOGD_VERSION}-\")) | .tagName] | sort | last // empty")
        if [ -z "$LATEST" ]; then
          SUFFIX="a"
        else
          LAST_SUFFIX="${LATEST##*-}"
          SUFFIX=$(echo "$LAST_SUFFIX" | tr 'a-y' 'b-z')
        fi
        VERSION="${NEOLOGD_VERSION}-${SUFFIX}"
        gh release create "$VERSION" \
          --title "SKK-JISYO.neologd $VERSION" \
          --notes "Dictionary built from mecab-ipadic-neologd (seed version: ${NEOLOGD_VERSION})" \
          SKK-JISYO.neologd
